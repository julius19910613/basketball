name: Preview

# 每个 PR 打开/更新时自动生成预览二维码
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  preview:
    name: Preview Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build miniprogram npm packages
        run: |
          cd miniprogram && npm ci
        working-directory: ./miniprogram

      - name: Preview build
        uses: crazyurus/miniprogram-action@master
        id: preview
        with:
          action_type: preview
          project_path: miniprogram
        env:
          PRIVATE_KEY: ${{ secrets.MINIPROGRAM_PRIVATE_KEY }}

      - name: Comment QR code to PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🧪 Preview Build\n\n**Commit:** `${{ github.event.pull_request.head.sha }}`\n\n**Status:** Preview generated\n\n---\n\nOpen the preview QR code:\n\n```\n${{ steps.preview.outputs.preview_qrcode_link }}\n```\n\n*Generated by GitHub Actions · ${{ github.workflow }}*\n'
            })
        if: steps.preview.outputs.preview_qrcode_link
